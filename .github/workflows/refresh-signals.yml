name: Refresh Signals

on:
  schedule:
    # Market hours: Mon-Fri 14:00-01:30 UTC (9:00 AM - 8:30 PM ET), every 15 minutes
    - cron: '0,15,30,45 14-23 * * 1-5'
    - cron: '0,15,30,45 0 * * 2-6'
    # 01:15 UTC (last 15-min slot before 01:30 ET close)
    - cron: '15 1 * * 2-6'

    # Off-hours: Mon-Fri, every hour
    # Before market (00:00-13:00 UTC)
    - cron: '0 0-13 * * 1-5'
    # After market (02:00-23:00 UTC next day boundary handled by 1-5)
    - cron: '0 2-23 * * 2-6'

  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      REFRESH_URL: https://stock-analyzer-phi-ten.vercel.app/api/signals/refresh
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate cron secret
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub Actions secret: CRON_SECRET"
            exit 1
          fi

      - name: Refresh signals
        run: |
          curl --fail-with-body --show-error --silent \
            --retry 2 --retry-delay 5 --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$REFRESH_URL"
